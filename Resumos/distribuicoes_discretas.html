<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Distribuições Discretas de Probabilidade</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0f0e0c;
    --bg2: #161511;
    --bg3: #1e1c17;
    --bg4: #252319;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8e4d9;
    --text2: #9d9882;
    --text3: #6b6654;
    --gold: #c9a84c;
    --gold2: #e8c96a;
    --gold-dim: rgba(201,168,76,0.12);
    --gold-dim2: rgba(201,168,76,0.22);
    --accent: #7c6f4a;
    --warn: #d4845a;
    --warn-bg: rgba(212,132,90,0.1);
    --info: #5a9fd4;
    --info-bg: rgba(90,159,212,0.1);
    --success: #6db87a;
    --success-bg: rgba(109,184,122,0.1);
    --serif: 'Crimson Pro', Georgia, serif;
    --sans: 'DM Sans', sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.65;
    min-height: 100vh;
  }

  /* ── LAYOUT ── */
  .app { display: flex; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--bg2);
    border-right: 0.5px solid var(--border);
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    z-index: 100;
  }
  .sidebar-header {
    padding: 24px 20px 18px;
    border-bottom: 0.5px solid var(--border);
  }
  .sidebar-title {
    font-family: var(--serif);
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .sidebar-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 3px;
    font-family: var(--mono);
  }
  .sidebar-nav { padding: 12px 0; flex: 1; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 20px;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 2px solid transparent;
    font-size: 13px;
    color: var(--text2);
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active {
    background: var(--gold-dim);
    color: var(--gold2);
    border-left-color: var(--gold);
  }
  .nav-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    min-width: 16px;
  }
  .nav-item.active .nav-num { color: var(--gold); }

  /* MAIN */
  .main {
    flex: 1;
    overflow-x: hidden;
    min-width: 0;
  }

  /* TOP BAR */
  .topbar {
    background: var(--bg2);
    border-bottom: 0.5px solid var(--border);
    padding: 0 40px;
    display: flex;
    align-items: center;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .topbar::-webkit-scrollbar { display: none; }
  .tab-btn {
    padding: 14px 16px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--gold2);
    border-bottom-color: var(--gold);
  }

  /* CONTENT AREA */
  .content { padding: 40px; max-width: 860px; }

  /* DIST HEADER */
  .dist-hero {
    margin-bottom: 36px;
    padding-bottom: 28px;
    border-bottom: 0.5px solid var(--border);
  }
  .dist-hero-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }
  .dist-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    background: var(--gold-dim);
    border: 0.5px solid rgba(201,168,76,0.3);
    padding: 4px 10px;
    border-radius: 4px;
    margin-bottom: 10px;
    display: inline-block;
  }
  .dist-name {
    font-family: var(--serif);
    font-size: 38px;
    font-weight: 300;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 6px;
  }
  .dist-name em { color: var(--gold2); font-style: italic; }
  .dist-tagline {
    font-size: 14px;
    color: var(--text2);
    max-width: 500px;
    line-height: 1.55;
  }
  .dist-params-badge {
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 14px 18px;
    font-family: var(--mono);
    font-size: 12px;
    min-width: 160px;
    flex-shrink: 0;
  }
  .dist-params-badge .pb-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin-bottom: 8px;
  }
  .pb-param { color: var(--gold2); line-height: 1.8; }
  .pb-param span { color: var(--text2); }

  /* SECTION */
  .section { margin-bottom: 40px; }
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: var(--border);
  }

  /* STORY */
  .story-card {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 26px;
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 300;
    line-height: 1.75;
    color: #d4cfc0;
  }
  .story-card p { margin-bottom: 14px; }
  .story-card p:last-child { margin-bottom: 0; }
  .story-card strong { color: var(--gold2); font-weight: 600; }
  .story-card em { color: var(--text2); font-style: italic; }

  .example-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }
  .chip {
    background: var(--bg4);
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 12px;
    color: var(--text2);
    font-family: var(--sans);
  }
  .chip::before { content: '↳ '; color: var(--text3); }

  /* FORMULA BOX */
  .formula-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 12px;
    margin-bottom: 12px;
  }
  .fbox {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
  }
  .fbox.highlight {
    border-color: rgba(201,168,76,0.35);
    background: var(--gold-dim);
  }
  .fbox-label {
    font-size: 10px;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    margin-bottom: 8px;
  }
  .fbox-formula {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--gold2);
    line-height: 1.6;
  }
  .fbox-note {
    font-size: 11px;
    color: var(--text3);
    margin-top: 6px;
    line-height: 1.4;
  }

  /* DERIVATION */
  .deriv {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .deriv-step {
    padding: 16px 22px;
    border-bottom: 0.5px solid var(--border);
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 16px;
    align-items: start;
  }
  .deriv-step:last-child { border-bottom: none; }
  .deriv-step.result-step {
    background: var(--gold-dim);
    border-color: rgba(201,168,76,0.2);
  }
  .step-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    padding-top: 2px;
  }
  .deriv-step.result-step .step-num { color: var(--gold); }
  .step-content {}
  .step-math {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--gold2);
    margin-bottom: 5px;
    line-height: 1.7;
  }
  .step-explain {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.5;
  }
  .step-explain strong { color: var(--text); font-weight: 500; }

  /* CHART */
  .chart-wrap {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .chart-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 0.5px solid var(--border);
    align-items: flex-end;
  }
  .ctrl {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 130px;
    flex: 1;
  }
  .ctrl-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    display: flex;
    justify-content: space-between;
  }
  .ctrl-label b { color: var(--gold2); font-weight: 500; }
  input[type=range] {
    width: 100%;
    accent-color: var(--gold);
    cursor: pointer;
  }
  .chart-stats {
    display: flex;
    gap: 16px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .cstat {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text3);
  }
  .cstat b { color: var(--gold2); font-weight: 500; }

  /* PROPS */
  .prop-list { display: flex; flex-direction: column; gap: 10px; }
  .prop-item {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-left: 3px solid var(--gold);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 13px 18px;
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--text2);
  }
  .prop-item strong { color: var(--text); font-weight: 500; }
  .prop-item code {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--gold2);
    background: var(--gold-dim);
    padding: 1px 5px;
    border-radius: 3px;
  }

  /* COMPARE */
  .compare-block {
    background: var(--warn-bg);
    border: 0.5px solid rgba(212,132,90,0.25);
    border-radius: var(--radius);
    padding: 16px 20px;
  }
  .compare-block + .compare-block { margin-top: 10px; }
  .compare-title {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--warn);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .compare-body {
    font-size: 13.5px;
    color: #c8ae92;
    line-height: 1.65;
  }
  .compare-body strong { color: var(--text); font-weight: 500; }

  .info-block {
    background: var(--info-bg);
    border: 0.5px solid rgba(90,159,212,0.25);
    border-radius: var(--radius);
    padding: 14px 18px;
    font-size: 13px;
    color: #92bdd8;
    line-height: 1.6;
    margin-top: 10px;
  }
  .info-block strong { color: var(--info); }

  .success-block {
    background: var(--success-bg);
    border: 0.5px solid rgba(109,184,122,0.25);
    border-radius: var(--radius);
    padding: 14px 18px;
    font-size: 13px;
    color: #8ecb98;
    line-height: 1.6;
    margin-top: 10px;
  }
  .success-block strong { color: var(--success); }

  /* TABLE */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    padding: 8px 12px;
    text-align: left;
    border-bottom: 0.5px solid var(--border2);
  }
  td {
    padding: 10px 12px;
    border-bottom: 0.5px solid var(--border);
    color: var(--text2);
    vertical-align: top;
    line-height: 1.5;
  }
  td:first-child { color: var(--gold2); font-family: var(--mono); font-size: 12px; }
  tr:last-child td { border-bottom: none; }

  /* HIDDEN */
  .dist-section { display: none; }
  .dist-section.visible { display: block; }
  .tab-panel { display: none; }
  .tab-panel.visible { display: block; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

  @media (max-width: 700px) {
    .sidebar { display: none; }
    .content { padding: 20px; }
    .topbar { padding: 0 16px; }
    .dist-name { font-size: 28px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Distribuições</div>
      <div class="sidebar-sub">Discretas · Probabilidade</div>
    </div>
    <nav class="sidebar-nav" id="sideNav"></nav>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar" id="topbar"></div>
    <div class="content" id="mainContent"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// MATH HELPERS
// ══════════════════════════════════════════════
function binom(n, k) {
  if (k < 0 || k > n) return 0;
  if (k === 0 || k === n) return 1;
  let r = 1;
  for (let i = 0; i < k; i++) r = r * (n - i) / (i + 1);
  return r;
}
function fact(n) { let r = 1; for (let i = 2; i <= n; i++) r *= i; return r; }
function pmf(id, p, n, r, N, K, lam, k) {
  const q = 1 - p;
  if (id === 'uniforme') return (k >= 1 && k <= n) ? 1 / n : 0;
  if (id === 'bernoulli') return k === 0 ? q : k === 1 ? p : 0;
  if (id === 'binomial') return binom(n, k) * Math.pow(p, k) * Math.pow(q, n - k);
  if (id === 'geometrica') return k >= 1 ? Math.pow(q, k - 1) * p : 0;
  if (id === 'negbin') return k >= r ? binom(k - 1, r - 1) * Math.pow(p, r) * Math.pow(q, k - r) : 0;
  if (id === 'hiper') {
    if (k < Math.max(0, n - (N - K)) || k > Math.min(n, K)) return 0;
    return binom(K, k) * binom(N - K, n - k) / binom(N, n);
  }
  if (id === 'poisson') return k >= 0 ? Math.exp(-lam) * Math.pow(lam, k) / fact(k) : 0;
  return 0;
}
function getRange(id, p, n, r, N, K, lam) {
  if (id === 'uniforme') return Array.from({ length: n }, (_, i) => i + 1);
  if (id === 'bernoulli') return [0, 1];
  if (id === 'binomial') return Array.from({ length: n + 1 }, (_, i) => i);
  if (id === 'geometrica') return Array.from({ length: Math.min(Math.ceil(10 / p), 30) }, (_, i) => i + 1);
  if (id === 'negbin') return Array.from({ length: Math.min(r + Math.ceil(12 * (1 - p) / p), 45) - r + 1 }, (_, i) => i + r);
  if (id === 'hiper') { let lo = Math.max(0, n - (N - K)), hi = Math.min(n, K); return Array.from({ length: hi - lo + 1 }, (_, i) => lo + i); }
  if (id === 'poisson') return Array.from({ length: Math.min(Math.ceil(lam + 4 * Math.sqrt(lam) + 3), 45) + 1 }, (_, i) => i);
  return [];
}

// ══════════════════════════════════════════════
// DISTRIBUTION DATA
// ══════════════════════════════════════════════
const DISTS = [
  {
    id: 'uniforme', num: '01',
    name: 'Uniforme', nameItalic: 'Discreta',
    tagline: 'Todos os resultados são igualmente prováveis — a distribuição da total ignorância.',
    params: { n: 6 },
    paramsBadge: [['n', 'número de resultados', '≥ 2']],
    color: '#9d9882',

    story: `
      <p>Imagine um dado comum de seis faces. Você o lança e pergunta: qual é a probabilidade de sair o número 3? A resposta intuitiva é <strong>1/6</strong>, e para qualquer outro número também é 1/6. Nenhuma face é privilegiada — há uma simetria perfeita de chances.</p>
      <p>Essa intuição, formalizada, é a <strong>Distribuição Uniforme Discreta</strong>. Ela surge sempre que um experimento tem um número finito de resultados e não existe razão alguma — física, lógica ou empírica — para favorecer um em detrimento de outro. É a distribuição da <em>máxima ignorância estruturada</em>: sabemos que algo acontecerá, mas não temos informação para discriminar entre as possibilidades.</p>
      <p>Em teoria da probabilidade, ela é o <strong>ponto de partida conceitual</strong>: antes de qualquer dado ou assimetria, a hipótese default é a uniformidade.</p>
    `,
    examples: ['Dado honesto de n faces', 'Sorteio de loteria', 'Geração de número aleatório inteiro', 'Roleta sem tendência'],

    formulas: `
      <div class="formula-grid">
        <div class="fbox highlight">
          <div class="fbox-label">FMP — P(X = k)</div>
          <div class="fbox-formula">P(X = k) = 1/n</div>
          <div class="fbox-note">para k = 1, 2, …, n</div>
        </div>
        <div class="fbox">
          <div class="fbox-label">FDA — F(k) = P(X ≤ k)</div>
          <div class="fbox-formula">F(k) = ⌊k⌋ / n</div>
          <div class="fbox-note">para 1 ≤ k ≤ n; F(k) = 0 se k &lt; 1; F(k) = 1 se k > n</div>
        </div>
      </div>
      <div class="formula-grid">
        <div class="fbox">
          <div class="fbox-label">Suporte</div>
          <div class="fbox-formula">X ∈ {1, 2, …, n}</div>
        </div>
        <div class="fbox">
          <div class="fbox-label">Esperança E[X]</div>
          <div class="fbox-formula">(n + 1) / 2</div>
        </div>
        <div class="fbox">
          <div class="fbox-label">Variância Var(X)</div>
          <div class="fbox-formula">(n² − 1) / 12</div>
        </div>
      </div>
    `,

    esperanca: `
      <div class="deriv">
        <div class="deriv-step">
          <div class="step-num">1</div>
          <div class="step-content">
            <div class="step-math">E[X] = Σ_{k=1}^{n} k · P(X = k)</div>
            <div class="step-explain">Definição de esperança: soma de cada valor pelo seu peso (probabilidade).</div>
          </div>
        </div>
        <div class="deriv-step">
          <div class="step-num">2</div>
          <div class="step-content">
            <div class="step-math">= Σ_{k=1}^{n} k · (1/n)</div>
            <div class="step-explain">Substituímos P(X = k) = 1/n, pois cada valor tem mesma probabilidade.</div>
          </div>
        </div>
        <div class="deriv-step">
          <div class="step-num">3</div>
          <div class="step-content">
            <div class="step-math">= (1/n) · Σ_{k=1}^{n} k</div>
            <div class="step-explain">O fator 1/n é constante, sai da soma.</div>
          </div>
        </div>
        <div class="deriv-step">
          <div class="step-num">4</div>
          <div class="step-content">
            <div class="step-math">= (1/n) · [n(n+1)/2]</div>
            <div class="step-explain"><strong>Gauss:</strong> a soma 1 + 2 + … + n = n(n+1)/2.</div>
          </div>
        </div>
        <div class="deriv-step result-step">
          <div class="step-num">✓</div>
          <div class="step-content">
            <div class="step-math">E[X] = (n + 1) / 2</div>
            <div class="step-explain">Simplificando n/n = 1. Intuitivo: é exatamente o valor médio do intervalo {1, …, n}.</div>
          </div>
        </div>
      </div>
    `,

    variancia: `
      <div class="deriv">
        <div class="deriv-step">
          <div class="step-num">1</div>
          <div class="step-content">
            <div class="step-math">Var(X) = E[X²] − (E[X])²</div>
            <div class="step-explain"><strong>Fórmula de König-Huygens.</strong> Usaremos esta identidade para simplificar os cálculos.</div>
          </div>
        </div>
        <div class="deriv-step">
          <div class="step-num">2</div>
          <div class="step-content">
            <div class="step-math">E[X²] = Σ_{k=1}^{n} k² · (1/n) = (1/n) · Σ_{k=1}^{n} k²</div>
            <div class="step-explain">Calculamos E[X²] usando P(X=k) = 1/n.</div>
          </div>
        </div>
        <div class="deriv-step">
          <div class="step-num">3</div>
          <div class="step-content">

          </div>
        </div>
        <div class="deriv-step result-step">
          <div class="step-num">✓</div>

            <div class="step-explain">Após álgebra, emerge o <strong>fator de correção (N-n)/(N-1)</strong>. É sempre ≤ 1, tornando a variância da Hipergeométrica sempre menor ou igual à da Binomial correspondente. Quando n=N (amostragem total), a variância é zero — faz sentido: você retira tudo e sabe o resultado com certeza.</div>

        <div class="prop-item"><strong>Convergência para Binomial:</strong> Quando N→∞ com K/N = p fixo, a Hipergeométrica(N, K, n) → Binomial(n, p). Para N ≥ 20n, a aproximação é excelente.</div>

  // ── POISSON ──
  {

      <p>O contexto original era macabro: Poisson estava interessado em erros judiciais — a probabilidade de um tribunal condenar um inocente. Mas a distribuição ganhou fama maior em outro contexto: <strong>o problema das mortes por coice de cavalo no exército prussiano</strong>, analisado por Ladislaus Bortkiewicz em 1898. Ele contou mortes em 14 corpos do exército por 20 anos e mostrou que se ajustavam perfeitamente a uma Poisson — um dos primeiros usos exitosos do modelo.</p>
      <p>A Poisson é o <strong>limite da Binomial</strong> quando n→∞ e p→0 com np=λ fixo: muitas tentativas, cada uma com chance minúscula, mas com uma taxa média λ constante. É a distribuição dos <em>eventos raros</em>.</p>
      <p>A beleza da Poisson está em seu único parâmetro λ, que ao mesmo tempo é média e variância. Se nos dados observados Var ≫ E[X], o processo não é Poisson — há <em>superdispersão</em>.</p>

    examples: ['E-mails recebidos por hora', 'Acidentes numa rodovia por mês', 'Mutações por gene por geração', 'Chegada de clientes numa fila', 'Contagem de fótons num detector'],

    esperanca: `
      <div class="deriv">

            <div class="step-explain">Definição. O termo k=0 contribui zero. Separamos e^(−λ) pois é constante.</div>
          </div>
        </div>
        <div class="deriv-step">
          <div class="step-num">2</div>
          <div class="step-content">
            <div class="step-math">= e^(−λ) · Σ_{k=1}^{∞} k · λᵏ / k!</div>
            <div class="step-explain">Retiramos e^(−λ) da soma. A soma inicia em k=1.</div>
          </div>
        </div>
        <div class="deriv-step">
          <div class="step-num">3</div>
          <div class="step-content">
            <div class="step-math">k / k! = 1 / (k−1)!</div>
            <div class="step-explain">Simplificação algébrica: k/k! = k/(k·(k-1)!) = 1/(k-1)!.</div>
          </div>
        </div>
        <div class="deriv-step">
          <div class="step-num">4</div>
          <div class="step-content">
            <div class="step-math">= e^(−λ) · λ · Σ_{k=1}^{∞} λᵏ⁻¹ / (k−1)!</div>
            <div class="step-explain">Fatoramos λ. Fazemos a substituição j = k−1.</div>
          </div>
        </div>
        <div class="deriv-step">
          <div class="step-num">5</div>
          <div class="step-content">
            <div class="step-math">= e^(−λ) · λ · Σ_{j=0}^{∞} λʲ / j!</div>
            <div class="step-explain">A soma Σ λʲ/j! é a <strong>série de Taylor de e^λ</strong>: Σ_{j=0}^∞ λʲ/j! = e^λ.</div>
          </div>
        </div>
        <div class="deriv-step result-step">
          <div class="step-num">✓</div>
          <div class="step-content">
            <div class="step-math">E[X] = e^(−λ) · λ · e^λ = λ</div>
            <div class="step-explain">e^(−λ) · e^λ = e^0 = 1. Elegante: a esperança é simplesmente λ, o único parâmetro do modelo.</div>

    variancia: `
      <div class="deriv">
        <div class="deriv-step">
          <div class="step-num">1</div>
          <div class="step-content">

            <div class="step-explain">König-Huygens. Calculamos E[X²] via E[X(X-1)] + E[X].</div>
          </div>
        </div>
        <div class="deriv-step">
          <div class="step-num">2</div>
          <div class="step-content">
            <div class="step-math">E[X(X−1)] = Σ_{k=2}^{∞} k(k−1) · e^(−λ) · λᵏ / k!</div>

        </div>

          <div class="step-content">

        <div class="deriv-step">
          <div class="step-num">4</div>
          <div class="step-content">

            <div class="step-explain">Fatoramos λ². Substituição j=k-2: a soma vira Σ λʲ/j! = e^λ novamente.</div>
          </div>
        </div>
        <div class="deriv-step">
          <div class="step-num">5</div>
          <div class="step-content">
            <div class="step-math">E[X(X−1)] = λ²  →  E[X²] = λ² + E[X] = λ² + λ</div>
            <div class="step-explain">e^(−λ)·e^λ = 1. Isolamos E[X²] = E[X(X-1)] + E[X].</div>
          </div>
        </div>
        <div class="deriv-step result-step">
          <div class="step-num">✓</div>
          <div class="step-content">
            <div class="step-math">Var(X) = (λ² + λ) − λ² = λ</div>
            <div class="step-explain"><strong>E[X] = Var(X) = λ.</strong> Propriedade única da Poisson. Na prática: se num conjunto de dados a variância da contagem é muito maior que a média, o processo não é Poisson (superdispersão) e modelos alternativos (Binomial Negativa) devem ser considerados.</div>
          </div>
        </div>
      </div>
    `,

    props: `
      <div class="prop-list">
        <div class="prop-item"><strong>E[X] = Var(X) = λ:</strong> a igualdade entre média e variância é a assinatura da Poisson. Um teste empírico: se Var/E[X] ≈ 1, o processo é possivelmente Poisson; se Var/E[X] ≫ 1, há superdispersão.</div>
        <div class="prop-item"><strong>Aditividade:</strong> Se X~Poisson(λ₁) e Y~Poisson(λ₂) independentes, então <code>X+Y ~ Poisson(λ₁+λ₂)</code>. Eventos de duas fontes independentes combinam-se naturalmente.</div>
        <div class="prop-item"><strong>Decomposição:</strong> Se X~Poisson(λ) e cada evento é classificado de forma independente como tipo A (prob. p) ou B (prob. 1-p), então Xₐ~Poisson(λp) e X_b~Poisson(λ(1-p)) e são independentes.</div>

      </div>
      <div class="compare-block">
        <div class="compare-title">⚡ Poisson vs. Binomial Negativa (superdispersão)</div>
        <div class="compare-body">A <strong>Poisson</strong> assume Var = E. A <strong>Binomial Negativa</strong> tem Var > E (superdispersão). Se ao ajustar um modelo de contagem a variância dos resíduos for muito maior que a média, a Binomial Negativa é mais adequada. Este é um diagnóstico fundamental em regressão de dados de contagem.</div>
      </div>
      <div class="success-block"><strong>Resumo dos limites:</strong> Bin(n,p) → Poisson(λ) quando n→∞, p→0, np=λ. Bin(n,p) → Normal(np, npq) quando n→∞ pelo TLC. BinNeg(r,p) → Poisson(λ) quando r→∞, p→1, r(1-p)→λ.</div>
    `
  }
];

// CHART RENDERER

function renderChart(dist) {
  const p = dist.params;
  const { id, color } = dist;
  const lam = p.lam || 4;
  const n = p.n || 10;
  const r = p.r || 3;
  const N = p.N || 30;
  const K = p.K || 12;
  const prob = p.p || 0.4;

  const range = getRange(id, prob, n, r, N, K, lam);
  const data = range.map(k => pmf(id, prob, n, r, N, K, lam, k));
  const cid = 'chart-' + id;
  const canvas = document.getElementById(cid);
  if (!canvas) return;
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }

  let E, V;
  if (id === 'uniforme') { E = (n + 1) / 2; V = (n * n - 1) / 12; }
  else if (id === 'bernoulli') { E = prob; V = prob * (1 - prob); }
  else if (id === 'binomial') { E = n * prob; V = n * prob * (1 - prob); }
  else if (id === 'geometrica') { E = 1 / prob; V = (1 - prob) / (prob * prob); }
  else if (id === 'negbin') { E = r / prob; V = r * (1 - prob) / (prob * prob); }
  else if (id === 'hiper') { E = n * K / N; V = n * (K / N) * ((N - K) / N) * ((N - n) / (N - 1)); }
  else if (id === 'poisson') { E = lam; V = lam; }

  const el = document.getElementById('stat-e-' + id);
  const vl = document.getElementById('stat-v-' + id);
  if (el) el.textContent = E.toFixed(3);
  if (vl) vl.textContent = V.toFixed(3);

  charts[id] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: range.map(String),
      datasets: [{
        data,
        backgroundColor: color + 'bb',
        borderColor: color,
        borderWidth: 1,
        borderRadius: 3,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e1c17',
          borderColor: '#3a3830',
          borderWidth: 1,
          titleColor: '#c9a84c',
          bodyColor: '#9d9882',
          callbacks: {
            title: ctx => 'k = ' + range[ctx[0].dataIndex],
            label: ctx => ' P(X = k) = ' + ctx.raw.toFixed(5)
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { color: '#6b6654', font: { size: 11, family: "'JetBrains Mono'" }, maxRotation: 0 },
          border: { color: '#2a2820' }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: '#6b6654', font: { size: 11, family: "'JetBrains Mono'" } },
          border: { color: '#2a2820' },
          min: 0
        }
      }
    }
  });
}

function buildControls(dist) {
  const { id } = dist;
  if (id === 'uniforme') return `

        <div class="ctrl-label">n — número de resultados <b id="u-n-v">${dist.params.n}</b></div>
        <input type="range" min="2" max="20" value="${dist.params.n}" oninput="dist_update('uniforme','n',+this.value,'u-n-v')">
      </div>

  if (id === 'bernoulli') return `
    <div class="chart-controls">
      <div class="ctrl">
        <div class="ctrl-label">p — probabilidade de sucesso <b id="be-p-v">${dist.params.p}</b></div>
        <input type="range" min="0.01" max="0.99" step="0.01" value="${dist.params.p}" oninput="dist_update('bernoulli','p',+this.value,'be-p-v')">
      </div>
    </div>`;
  if (id === 'binomial') return `
    <div class="chart-controls">
      <div class="ctrl">
        <div class="ctrl-label">n — tentativas <b id="bi-n-v">${dist.params.n}</b></div>
        <input type="range" min="1" max="40" value="${dist.params.n}" oninput="dist_update('binomial','n',+this.value,'bi-n-v')">
      </div>
      <div class="ctrl">
        <div class="ctrl-label">p — prob. de sucesso <b id="bi-p-v">${dist.params.p}</b></div>
        <input type="range" min="0.01" max="0.99" step="0.01" value="${dist.params.p}" oninput="dist_update('binomial','p',+this.value,'bi-p-v')">
      </div>
    </div>`;
  if (id === 'geometrica') return `
    <div class="chart-controls">
      <div class="ctrl">
        <div class="ctrl-label">p — prob. de sucesso <b id="ge-p-v">${dist.params.p}</b></div>
        <input type="range" min="0.05" max="0.99" step="0.01" value="${dist.params.p}" oninput="dist_update('geometrica','p',+this.value,'ge-p-v')">
      </div>
    </div>`;
  if (id === 'negbin') return `
    <div class="chart-controls">
      <div class="ctrl">
        <div class="ctrl-label">r — nº de sucessos alvo <b id="nb-r-v">${dist.params.r}</b></div>
        <input type="range" min="1" max="15" value="${dist.params.r}" oninput="dist_update('negbin','r',+this.value,'nb-r-v')">
      </div>
      <div class="ctrl">
        <div class="ctrl-label">p — prob. de sucesso <b id="nb-p-v">${dist.params.p}</b></div>
        <input type="range" min="0.05" max="0.95" step="0.01" value="${dist.params.p}" oninput="dist_update('negbin','p',+this.value,'nb-p-v')">
      </div>
    </div>`;
  if (id === 'hiper') return `
    <div class="chart-controls">
      <div class="ctrl">
        <div class="ctrl-label">N — população <b id="hi-N-v">${dist.params.N}</b></div>
        <input type="range" min="10" max="60" value="${dist.params.N}" oninput="dist_update('hiper','N',+this.value,'hi-N-v')">
      </div>
      <div class="ctrl">
        <div class="ctrl-label">K — especiais na pop. <b id="hi-K-v">${dist.params.K}</b></div>
        <input type="range" min="1" max="${dist.params.N-1}" value="${dist.params.K}" oninput="dist_update('hiper','K',+this.value,'hi-K-v')">
      </div>
      <div class="ctrl">
        <div class="ctrl-label">n — amostra <b id="hi-n-v">${dist.params.n}</b></div>
        <input type="range" min="1" max="${Math.floor(dist.params.N/2)}" value="${dist.params.n}" oninput="dist_update('hiper','n',+this.value,'hi-n-v')">
      </div>
    </div>`;
  if (id === 'poisson') return `
    <div class="chart-controls">
      <div class="ctrl">
        <div class="ctrl-label">λ — taxa média <b id="po-l-v">${dist.params.lam}</b></div>
        <input type="range" min="0.5" max="20" step="0.5" value="${dist.params.lam}" oninput="dist_update('poisson','lam',+this.value,'po-l-v')">
      </div>

  return '';

window.dist_update = function(id, key, val, labelId) {
  const dist = DISTS.find(d => d.id === id);
  dist.params[key] = val;
  const label = document.getElementById(labelId);
  if (label) label.textContent = val;
  setTimeout(() => renderChart(dist), 10);
};

}

function renderDist(distId, tabId) {
  const dist = DISTS.find(d => d.id === distId);
  currentDist = distId;
  currentTab = tabId;

  // Update sidebar
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.dist === distId);
  });

  // Update tabs
  document.querySelectorAll('.tab-btn').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tabId);
  });

  // Render header + content
  const pb = dist.paramsBadge.map(([k, d, c]) =>
    `<div class="pb-param">${k} <span>— ${d}</span></div>`
  ).join('');

  const content = document.getElementById('mainContent');
  content.innerHTML = `
    <div class="dist-hero">
      <div class="dist-hero-top">
        <div>
          <span class="dist-tag">${dist.num} / 07</span>
          <div class="dist-name">${dist.nameItalic ? `${dist.name} <em>${dist.nameItalic}</em>` : dist.name}</div>
          <div class="dist-tagline">${dist.tagline}</div>
        </div>
        <div class="dist-params-badge">
          <div class="pb-title">Parâmetros</div>
          ${pb}
        </div>
      </div>
    </div>
    ${buildTabContent(dist, tabId)}
  `;

  if (tabId === 'formulas') {
    setTimeout(() => renderChart(dist), 80);
  }
}

// ══════════════════════════════════════════════
// BUILD NAV & TABS
// ══════════════════════════════════════════════
const sideNav = document.getElementById('sideNav');
DISTS.forEach(d => {
  const item = document.createElement('div');
  item.className = 'nav-item' + (d.id === currentDist ? ' active' : '');
  item.dataset.dist = d.id;
  item.innerHTML = `<span class="nav-num">${d.num}</span>${d.name}`;
  item.onclick = () => renderDist(d.id, currentTab);
  sideNav.appendChild(item);
});

const topbar = document.getElementById('topbar');
TABS.forEach(t => {
  const btn = document.createElement('div');
  btn.className = 'tab-btn' + (t.id === currentTab ? ' active' : '');
  btn.dataset.tab = t.id;
  btn.textContent = t.label;
  btn.onclick = () => renderDist(currentDist, t.id);
  topbar.appendChild(btn);
});

// Initial render
renderDist('uniforme', 'historia');
</script>
</body>
</html>
